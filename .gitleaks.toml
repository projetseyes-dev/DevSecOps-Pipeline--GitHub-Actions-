# Gitleaks custom configuration
# Extends the default ruleset and adds organisation-specific rules.
# Reference: https://github.com/gitleaks/gitleaks

title = "DevSecOps Pipeline - Gitleaks Policy"

[extend]
useDefault = true

[[rules]]
id = "internal-api-token"
description = "Detects internal API tokens prefixed with INT_TKN_"
regex = '''INT_TKN_[A-Za-z0-9]{24,}'''
tags = ["token", "internal"]

[[rules]]
id = "generic-high-entropy-secret"
description = "High-entropy string assigned to a sensitive variable name"
regex = '''(?i)(api[_-]?key|secret|token|password)\s*[:=]\s*['"][A-Za-z0-9+/=_\-]{32,}['"]'''
tags = ["generic", "entropy"]

[allowlist]
description = "Paths and patterns excluded from secret scanning"
paths = [
  '''(.*?)\.lock''',
  '''(.*?)package-lock\.json''',
  '''docs/policy/.*''',
  '''.*\.md''',
  '''reports/.*'''
]
regexes = [
  '''EXAMPLE_[A-Z0-9_]+''',
  '''DUMMY_[A-Z0-9_]+'''
]
